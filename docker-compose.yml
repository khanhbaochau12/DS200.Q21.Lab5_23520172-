services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: people_counter
    volumes:
      - mongo_data:/data/db
      - ./storage/mongo_init.js:/docker-entrypoint-initdb.d/mongo_init.js:ro
    command: ["mongod", "--auth", "--bind_ip_all"]

  frame_acquisition:
    build: ./frame_acquisition
    depends_on:
      - kafka
    volumes:
      - ./videos:/app/videos:ro
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      VIDEO_PATH: /app/videos/video1.mp4

  object_detection:
    build: ./object_detection
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP: kafka:9092

  storage:
    build: ./storage
    depends_on:
      - kafka
      - mongodb
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/people_counter?authSource=admin

volumes:
  mongo_data:
